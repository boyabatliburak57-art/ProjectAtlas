name: Secret Scan

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

jobs:
  gitleaks:
    name: Gitleaks v8.30.1
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    env:
      GITLEAKS_VERSION: '8.30.1'
    steps:
      - name: Check out full history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify synthetic detection
        run: bash scripts/test-secret-scan.sh

      - name: Scan working tree and Git history
        run: bash scripts/secret-scan.sh --all
