apiVersion: v1
kind: ConfigMap
metadata:
  name: atlas-runtime-config
data:
  API_CORS_ORIGIN: https://staging.atlas.example
  API_DEBUG: 'false'
  SECURITY_RATE_LIMIT_ENABLED: 'true'
  ATLAS_ENV: staging
  CONFIG_SCHEMA_VERSION: '1'
  HEALTH_CHECK_DATABASE: 'true'
  LOG_LEVEL: log
  NEXT_PUBLIC_API_URL: https://api.staging.atlas.example/api/v1
  NODE_ENV: production
  OBJECT_STORAGE_BUCKET: atlas-staging
  OBJECT_STORAGE_ENDPOINT: https://object-storage.staging.example
  BACKUP_POLICY_VERSION: recovery-v1
  BACKUP_STATUS_MAX_AGE_SECONDS: '3600'
  OBJECT_STORAGE_CHECKSUM: sha256
  OBJECT_STORAGE_LIFECYCLE_POLICY: artifact-retention-v1
  RECOVERY_RPO_TARGET_SECONDS: '900'
  RECOVERY_RTO_TARGET_SECONDS: '7200'
  RETENTION_BATCH_LIMIT: '500'
  RETENTION_POLICY_VERSION: retention-v1
  RELEASE_COMMIT_SHA: required-at-deploy
  RELEASE_VERSION: required-at-deploy
  TELEMETRY_POLICY_VERSION: telemetry-v1
  WORKER_DEBUG: 'false'
  WORKER_HEALTH_FILE: /tmp/atlas-worker-ready
  WORKER_LOG_LEVEL: info
